<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CONFESS/48</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0a0a0a;color:#fff;font-family:'JetBrains Mono',monospace;display:flex;justify-content:center;align-items:center;min-height:100vh;overflow:hidden}
  body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(255,34,34,0.015) 2px,rgba(255,34,34,0.015) 4px);pointer-events:none;z-index:1}
  .wrap{text-align:center;position:relative;z-index:2}
  .title{font-size:clamp(28px,6vw,48px);font-weight:700;letter-spacing:8px;margin-bottom:16px}
  .title span{color:#ff2222}
  .code{font-size:11px;letter-spacing:4px;color:#333;margin-bottom:32px}
  .status{font-size:10px;letter-spacing:3px;color:#ff2222;animation:blink 2s infinite}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
  ::selection{background:#ff2222;color:#0a0a0a}
</style>
</head>
<body>
<div class="wrap">
  <div class="title">CONFESS<span>/48</span></div>
  <div class="code">404 — FILE NOT FOUND</div>
  <div class="status">● CLOCK PENDING</div>
</div>
</body>
</html>
